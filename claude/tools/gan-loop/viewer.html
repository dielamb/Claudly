<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>GAN Loop Viewer</title>
<script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/prismjs@1.29.0/prism.min.js"></script>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/prismjs@1.29.0/themes/prism-tomorrow.min.css">
<style>
  :root {
    --bg: #0d1117;
    --surface: #161b22;
    --surface-2: #1c2128;
    --surface-3: #22272e;
    --border: #30363d;
    --border-soft: #21262d;
    --text: #e6edf3;
    --text-dim: #7d8590;
    --text-faint: #484f58;
    --accent: #58a6ff;
    --accent-soft: rgba(88, 166, 255, 0.15);
    --pass: #3fb950;
    --pass-soft: rgba(63, 185, 80, 0.15);
    --warn: #d29922;
    --warn-soft: rgba(210, 153, 34, 0.15);
    --fail: #f85149;
    --fail-soft: rgba(248, 81, 73, 0.15);
    --purple: #bc8cff;
    --cyan: #39c5cf;
    --code-bg: #0d1117;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  html, body { height: 100%; }
  body {
    font: 14px -apple-system, BlinkMacSystemFont, "Segoe UI", "Helvetica Neue", sans-serif;
    background: var(--bg);
    color: var(--text);
    display: flex;
    flex-direction: column;
    overflow: hidden;
  }
  .mono { font-family: ui-monospace, "SF Mono", Menlo, monospace; }

  /* Header */
  header {
    display: flex;
    align-items: center;
    gap: 14px;
    padding: 10px 18px;
    background: var(--surface);
    border-bottom: 1px solid var(--border);
    flex-shrink: 0;
  }
  .brand { font-weight: 700; font-size: 14px; letter-spacing: 0.06em; color: var(--accent); }
  .run-selector {
    background: var(--surface-2);
    border: 1px solid var(--border);
    color: var(--text);
    padding: 6px 10px;
    border-radius: 6px;
    font-size: 12.5px;
    min-width: 380px;
    cursor: pointer;
    font-family: ui-monospace, "SF Mono", Menlo, monospace;
  }
  .view-toggle { display: flex; gap: 2px; background: var(--surface-2); border-radius: 6px; padding: 2px; }
  .view-toggle button {
    background: transparent;
    border: none;
    color: var(--text-dim);
    padding: 5px 11px;
    font-size: 12px;
    cursor: pointer;
    border-radius: 4px;
    transition: 0.15s;
  }
  .view-toggle button.active { background: var(--accent); color: #fff; }
  .badge {
    font-size: 11px;
    padding: 3px 9px;
    border-radius: 11px;
    font-weight: 600;
    letter-spacing: 0.02em;
  }
  .badge.pass { background: var(--pass-soft); color: var(--pass); }
  .badge.warn { background: var(--warn-soft); color: var(--warn); }
  .badge.fail { background: var(--fail-soft); color: var(--fail); }
  .meta { color: var(--text-dim); font-size: 12px; }
  .meta strong { color: var(--text); }

  /* Main */
  main { flex: 1; display: flex; overflow: hidden; min-height: 0; }
  .panel {
    overflow-y: auto;
    transition: width 0.2s ease, opacity 0.2s ease;
    background: var(--bg);
    min-width: 0;
  }
  .panel.left { border-right: 1px solid var(--border); }
  .panel-header {
    position: sticky;
    top: 0;
    background: var(--surface);
    border-bottom: 1px solid var(--border);
    padding: 9px 18px;
    font-weight: 600;
    color: var(--text-dim);
    text-transform: uppercase;
    font-size: 10.5px;
    letter-spacing: 0.1em;
    z-index: 10;
    display: flex;
    align-items: center;
    gap: 10px;
  }
  .panel-body { padding: 22px 28px; max-width: 920px; margin: 0 auto; }

  /* Markdown */
  .markdown h1, .markdown h2, .markdown h3 { margin: 22px 0 10px; line-height: 1.3; font-weight: 600; }
  .markdown h1 { font-size: 23px; border-bottom: 1px solid var(--border); padding-bottom: 7px; }
  .markdown h2 { font-size: 18px; }
  .markdown h3 { font-size: 15.5px; color: var(--text); }
  .markdown p { line-height: 1.65; margin: 11px 0; }
  .markdown ul, .markdown ol { margin: 11px 0 11px 24px; line-height: 1.65; }
  .markdown li { margin: 3px 0; }
  .markdown table { border-collapse: collapse; margin: 14px 0; font-size: 12.5px; width: 100%; }
  .markdown th, .markdown td { border: 1px solid var(--border); padding: 6px 9px; text-align: left; }
  .markdown th { background: var(--surface-2); font-weight: 600; }
  .markdown code { background: var(--surface-2); padding: 2px 5px; border-radius: 3px; font-size: 12px; font-family: ui-monospace, "SF Mono", Menlo, monospace; color: #f0f6fc; }
  .markdown pre { background: var(--code-bg) !important; border: 1px solid var(--border); border-radius: 6px; padding: 12px 14px; overflow-x: auto; margin: 13px 0; font-size: 12px; }
  .markdown pre code { background: transparent; padding: 0; }
  .markdown blockquote { border-left: 3px solid var(--accent); padding-left: 12px; color: var(--text-dim); margin: 12px 0; }
  .markdown a { color: var(--accent); text-decoration: none; }
  .markdown a:hover { text-decoration: underline; }
  .markdown hr { border: 0; border-top: 1px solid var(--border); margin: 22px 0; }

  /* === Workflow Overview (Mirofish-style) === */
  .workflow-overview {
    padding: 16px 16px 0;
  }
  .workflow-metrics {
    display: flex;
    align-items: center;
    gap: 18px;
    padding: 12px 14px;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 8px;
    margin-bottom: 14px;
  }
  .metric {
    display: flex;
    flex-direction: column;
    gap: 2px;
  }
  .metric-label {
    font-size: 10px;
    color: var(--text-faint);
    text-transform: uppercase;
    letter-spacing: 0.08em;
    font-weight: 600;
  }
  .metric-value {
    font-size: 14px;
    color: var(--text);
    font-family: ui-monospace, "SF Mono", Menlo, monospace;
    font-weight: 600;
  }
  .metric-right { margin-left: auto; }
  .metric-pill {
    padding: 4px 10px;
    border-radius: 11px;
    font-size: 11px;
    font-weight: 600;
    letter-spacing: 0.02em;
  }
  .pill--pass { background: var(--pass-soft); color: var(--pass); }
  .pill--warn { background: var(--warn-soft); color: var(--warn); }
  .pill--fail { background: var(--fail-soft); color: var(--fail); }

  /* === Event Timeline === */
  .timeline {
    padding: 0 16px 28px;
    position: relative;
  }
  .timeline-section-header {
    margin: 18px 0 8px;
    color: var(--text-dim);
    font-size: 10.5px;
    text-transform: uppercase;
    letter-spacing: 0.12em;
    font-weight: 700;
    padding: 0 4px;
  }
  .event {
    display: flex;
    gap: 12px;
    margin-bottom: 0;
    position: relative;
  }
  .event-rail {
    flex-shrink: 0;
    width: 22px;
    display: flex;
    flex-direction: column;
    align-items: center;
    padding-top: 16px;
  }
  .event-dot {
    width: 11px;
    height: 11px;
    border-radius: 50%;
    background: var(--text-faint);
    border: 2px solid var(--bg);
    box-shadow: 0 0 0 2px var(--text-faint);
    z-index: 2;
    flex-shrink: 0;
    transition: 0.2s;
  }
  .event-line {
    width: 2px;
    flex: 1;
    background: var(--border);
    margin-top: 2px;
    margin-bottom: -2px;
  }
  .event:last-child .event-line { display: none; }
  .event-card {
    flex: 1;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 7px;
    margin-bottom: 8px;
    overflow: hidden;
    transition: border-color 0.15s;
  }
  .event-card:hover { border-color: var(--text-faint); }
  .event-head {
    display: flex;
    align-items: center;
    gap: 10px;
    padding: 9px 13px;
    cursor: pointer;
    user-select: none;
  }
  .event-action {
    font-size: 10px;
    font-weight: 700;
    letter-spacing: 0.08em;
    color: var(--text-dim);
    padding: 2px 7px;
    border-radius: 4px;
    background: var(--surface-2);
    text-transform: uppercase;
    font-family: ui-monospace, "SF Mono", Menlo, monospace;
    flex-shrink: 0;
  }
  .event-title {
    flex: 1;
    color: var(--text);
    font-size: 13px;
    font-weight: 500;
    overflow: hidden;
    text-overflow: ellipsis;
    white-space: nowrap;
  }
  .event-meta {
    color: var(--text-dim);
    font-size: 11px;
    font-family: ui-monospace, "SF Mono", Menlo, monospace;
    flex-shrink: 0;
  }
  .event-toggle {
    color: var(--text-faint);
    font-size: 11px;
    transition: 0.2s;
  }
  .event-card[data-open="false"] .event-toggle { transform: rotate(-90deg); }
  .event-card[data-open="true"] .event-toggle { color: var(--text-dim); }
  .event-body {
    border-top: 1px solid var(--border-soft);
    padding: 12px 14px;
    display: none;
    font-size: 12.5px;
  }
  .event-card[data-open="true"] .event-body { display: block; }

  /* Event types — dot colors */
  .event[data-kind="trigger"] .event-dot { background: var(--purple); box-shadow: 0 0 0 2px var(--purple); }
  .event[data-kind="trigger"] .event-action { color: var(--purple); background: rgba(188,140,255,0.12); }
  .event[data-kind="preflight"] .event-dot { background: var(--cyan); box-shadow: 0 0 0 2px var(--cyan); }
  .event[data-kind="preflight"] .event-action { color: var(--cyan); background: rgba(57,197,207,0.12); }
  .event[data-kind="rubric"] .event-dot { background: var(--cyan); box-shadow: 0 0 0 2px var(--cyan); }
  .event[data-kind="rubric"] .event-action { color: var(--cyan); background: rgba(57,197,207,0.12); }
  .event[data-kind="brief"] .event-dot { background: var(--cyan); box-shadow: 0 0 0 2px var(--cyan); }
  .event[data-kind="brief"] .event-action { color: var(--cyan); background: rgba(57,197,207,0.12); }
  .event[data-kind="iter"] .event-dot { background: var(--accent); box-shadow: 0 0 0 2px var(--accent); }
  .event[data-kind="iter"] .event-action { color: var(--accent); background: var(--accent-soft); }
  .event[data-kind="generator"] .event-dot { background: var(--accent); box-shadow: 0 0 0 2px var(--accent); }
  .event[data-kind="generator"] .event-action { color: var(--accent); background: var(--accent-soft); }
  .event[data-kind="evaluator"] .event-dot { background: var(--warn); box-shadow: 0 0 0 2px var(--warn); }
  .event[data-kind="evaluator"] .event-action { color: var(--warn); background: var(--warn-soft); }
  .event[data-kind="score-pass"] .event-dot { background: var(--pass); box-shadow: 0 0 0 2px var(--pass); }
  .event[data-kind="score-pass"] .event-action { color: var(--pass); background: var(--pass-soft); }
  .event[data-kind="score-fail"] .event-dot { background: var(--fail); box-shadow: 0 0 0 2px var(--fail); }
  .event[data-kind="score-fail"] .event-action { color: var(--fail); background: var(--fail-soft); }
  .event[data-kind="cleanup"] .event-dot { background: var(--purple); box-shadow: 0 0 0 2px var(--purple); }
  .event[data-kind="cleanup"] .event-action { color: var(--purple); background: rgba(188,140,255,0.12); }
  .event[data-kind="output"] .event-dot { background: var(--pass); box-shadow: 0 0 0 2px var(--pass); }
  .event[data-kind="output"] .event-action { color: var(--pass); background: var(--pass-soft); }
  .event[data-kind="commit"] .event-dot { background: var(--pass); box-shadow: 0 0 0 2px var(--pass); }
  .event[data-kind="commit"] .event-action { color: var(--pass); background: var(--pass-soft); }
  .event[data-kind="exit"] .event-dot { background: var(--text-dim); box-shadow: 0 0 0 2px var(--text-dim); }
  .event[data-kind="exit"] .event-action { color: var(--text-dim); }

  /* Event body content helpers */
  .info-row { display: flex; gap: 12px; padding: 4px 0; font-size: 12px; }
  .info-row .key { color: var(--text-dim); min-width: 100px; flex-shrink: 0; }
  .info-row .val { color: var(--text); font-family: ui-monospace, "SF Mono", Menlo, monospace; word-break: break-all; }
  .score-bar {
    display: flex;
    align-items: center;
    gap: 10px;
    margin: 10px 0 6px;
  }
  .score-bar-track {
    flex: 1;
    height: 6px;
    background: var(--surface-2);
    border-radius: 3px;
    overflow: hidden;
    position: relative;
  }
  .score-bar-fill {
    height: 100%;
    background: linear-gradient(90deg, var(--fail), var(--warn) 60%, var(--pass) 90%);
    transition: width 0.3s ease;
  }
  .score-bar-val {
    font-family: ui-monospace, "SF Mono", Menlo, monospace;
    font-size: 12px;
    min-width: 56px;
    text-align: right;
    font-weight: 600;
  }
  .score-table {
    width: 100%;
    border-collapse: collapse;
    margin: 8px 0;
    font-size: 11.5px;
  }
  .score-table th, .score-table td {
    border-bottom: 1px solid var(--border-soft);
    padding: 5px 7px;
    text-align: left;
  }
  .score-table th { color: var(--text-faint); font-weight: 600; text-transform: uppercase; font-size: 10px; letter-spacing: 0.06em; }
  .score-table td.num { font-family: ui-monospace, "SF Mono", Menlo, monospace; text-align: right; }
  .score-bullet {
    display: inline-block;
    width: 8px;
    height: 8px;
    border-radius: 50%;
    margin-right: 6px;
    vertical-align: middle;
  }
  .issue-counts { display: flex; gap: 14px; margin-top: 8px; }
  .issue-pill {
    display: flex;
    align-items: center;
    gap: 5px;
    font-size: 11.5px;
    color: var(--text-dim);
  }
  .issue-pill .num { font-family: ui-monospace, "SF Mono", Menlo, monospace; font-weight: 700; color: var(--text); }
  .issue-pill.crit .num { color: var(--fail); }
  .issue-pill.major .num { color: var(--warn); }
  .issue-pill.minor .num { color: var(--text-dim); }

  .preview-content {
    margin-top: 10px;
    padding: 12px 14px;
    background: var(--surface-2);
    border: 1px solid var(--border);
    border-radius: 6px;
    font-size: 12px;
    line-height: 1.55;
    color: var(--text);
    max-height: 480px;
    overflow-y: auto;
  }
  .preview-content.full { max-height: none; }
  .preview-content .markdown h1 { font-size: 17px; }
  .preview-content .markdown h2 { font-size: 14.5px; }
  .preview-content .markdown h3 { font-size: 13px; }
  .preview-content .markdown p { margin: 7px 0; font-size: 12px; }
  .preview-content .markdown li { font-size: 12px; }

  /* Mirofish-style expand button */
  .expand-btn {
    display: inline-flex;
    align-items: center;
    gap: 8px;
    margin-top: 12px;
    padding: 8px 14px;
    background: var(--surface-2);
    border: 1px solid var(--border);
    border-radius: 6px;
    color: var(--text);
    font-size: 12px;
    font-weight: 600;
    cursor: pointer;
    letter-spacing: 0.02em;
    transition: 0.15s;
    user-select: none;
  }
  .expand-btn:hover {
    background: var(--surface-3);
    border-color: var(--accent);
    color: var(--accent);
  }
  .expand-btn .chev {
    display: inline-block;
    transition: transform 0.2s;
    font-size: 10px;
    color: var(--text-dim);
  }
  .expand-btn.open .chev { transform: rotate(90deg); color: var(--accent); }
  .expand-btn .icon {
    width: 14px;
    height: 14px;
    display: inline-block;
  }
  .expanded-content {
    margin-top: 10px;
  }
  .expanded-content[hidden] { display: none; }

  .empty {
    color: var(--text-dim);
    font-style: italic;
    padding: 40px;
    text-align: center;
  }

  /* View modes */
  body[data-view="report"] .panel.left { width: 100%; }
  body[data-view="report"] .panel.right { width: 0; opacity: 0; }
  body[data-view="timeline"] .panel.left { width: 0; opacity: 0; }
  body[data-view="timeline"] .panel.right { width: 100%; }
  body[data-view="split"] .panel.left { width: 58%; }
  body[data-view="split"] .panel.right { width: 42%; }
</style>
</head>
<body data-view="split">
<header>
  <div class="brand">GAN LOOP</div>
  <select class="run-selector" id="runSelect"></select>
  <div class="view-toggle" role="group">
    <button data-view="report">Report</button>
    <button data-view="split" class="active">Split</button>
    <button data-view="timeline">Timeline</button>
  </div>
  <div class="meta" id="meta"></div>
  <div style="margin-left: auto;" id="badges"></div>
</header>
<main>
  <section class="panel left">
    <div class="panel-header">Final Draft</div>
    <div class="panel-body markdown" id="draftView"><div class="empty">Select a run.</div></div>
  </section>
  <section class="panel right">
    <div class="panel-header">Run Timeline</div>
    <div id="timelineView"><div class="empty">Select a run.</div></div>
  </section>
</main>
<script>document.write("<script src=\"viewer-data.js?v=" + Date.now() + "\"><\/script>");</script>
<script>
(() => {
  const runs = (window.GAN_RUNS || []).slice().sort((a, b) => b.id.localeCompare(a.id));
  const select = document.getElementById('runSelect');
  const draftView = document.getElementById('draftView');
  const timelineView = document.getElementById('timelineView');
  const meta = document.getElementById('meta');
  const badges = document.getElementById('badges');

  if (runs.length === 0) {
    select.innerHTML = '<option>No runs found — run viewer-build.sh</option>';
    return;
  }

  runs.forEach((run, i) => {
    const opt = document.createElement('option');
    opt.value = i;
    const verdictMark = run.verdict === 'PASS' ? '✓' : run.verdict === 'accept-with-notes' ? '⚠' : '✗';
    opt.textContent = `${verdictMark}  ${run.id}  —  ${run.score?.toFixed(2) ?? '?'}/10`;
    select.appendChild(opt);
  });

  const decode = b64 => {
    if (!b64) return '';
    try { return decodeURIComponent(escape(atob(b64))); }
    catch { try { return atob(b64); } catch { return ''; } }
  };

  const fmtTime = epoch => {
    if (!epoch) return '—';
    const d = new Date(epoch * 1000);
    const pad = n => String(n).padStart(2, '0');
    return `${pad(d.getHours())}:${pad(d.getMinutes())}:${pad(d.getSeconds())}`;
  };

  const fmtDuration = sec => {
    if (!sec || sec < 0) return '—';
    if (sec < 60) return `${sec}s`;
    const m = Math.floor(sec / 60), s = sec % 60;
    return `${m}m ${s}s`;
  };

  const escapeHtml = s => String(s ?? '').replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;');

  const renderMd = md => marked.parse(md || '');

  const scoreColor = score => {
    if (score >= 9.0) return 'var(--pass)';
    if (score >= 7.0) return 'var(--warn)';
    return 'var(--fail)';
  };

  // Render score breakdown table
  const scoreTableHtml = breakdown => {
    if (!breakdown || !breakdown.length) return '';
    let rows = breakdown.map(r => {
      const sc = parseFloat(String(r.score).split('/')[0]) || 0;
      const dotColor = sc >= 9 ? 'var(--pass)' : sc >= 7 ? 'var(--warn)' : 'var(--fail)';
      return `<tr>
        <td><span class="score-bullet" style="background:${dotColor}"></span>${escapeHtml(r.criterion)}</td>
        <td class="num mono">${escapeHtml(r.score)}</td>
        <td class="num mono">${escapeHtml(r.weight)}</td>
        <td class="num mono">${escapeHtml(r.weighted)}</td>
      </tr>`;
    }).join('');
    return `<table class="score-table">
      <thead><tr><th>Criterion</th><th class="num">Score</th><th class="num">Weight</th><th class="num">Weighted</th></tr></thead>
      <tbody>${rows}</tbody>
    </table>`;
  };

  const issueCountsHtml = issues => {
    const c = issues?.critical ?? 0, m = issues?.major ?? 0, n = issues?.minor ?? 0;
    return `<div class="issue-counts">
      <span class="issue-pill crit"><span class="num">${c}</span> critical</span>
      <span class="issue-pill major"><span class="num">${m}</span> major</span>
      <span class="issue-pill minor"><span class="num">${n}</span> minor</span>
    </div>`;
  };

  // Mirofish-style expandable button + content
  let expandCounter = 0;
  const expandable = (label, contentHtml, opts = {}) => {
    const id = `exp-${++expandCounter}`;
    const startOpen = opts.open ?? false;
    return `<button class="expand-btn ${startOpen ? 'open' : ''}" onclick="(function(b){const c=document.getElementById('${id}');b.classList.toggle('open');c.hidden=!c.hidden;})(this)">
      <span class="icon">📄</span><span>${escapeHtml(label)}</span><span class="chev">▸</span>
    </button>
    <div class="expanded-content" id="${id}" ${startOpen ? '' : 'hidden'}>
      <div class="preview-content full markdown">${contentHtml}</div>
    </div>`;
  };

  // Build event array for a run
  const buildEvents = r => {
    const events = [];
    const taskLabel = r.task || r.id;

    // 1. Trigger
    events.push({
      kind: 'trigger',
      action: 'Trigger',
      title: `GAN loop invoked — task: ${taskLabel}`,
      timestamp: r.start_epoch,
      body: `<div class="info-row"><span class="key">Run ID</span><span class="val">${escapeHtml(r.id)}</span></div>
        <div class="info-row"><span class="key">Source</span><span class="val">run.sh briefs/${escapeHtml(r.task || '?')}.md</span></div>
        <div class="info-row"><span class="key">Start time</span><span class="val">${fmtTime(r.start_epoch)}</span></div>`
    });

    // 2. Preflight
    events.push({
      kind: 'preflight',
      action: 'Preflight',
      title: `Profile: ${r.profile || 'default'} · threshold: ${r.threshold || (r.profile === 'code' ? '9.0' : '8.5')}`,
      timestamp: r.start_epoch + 1,
      body: `<div class="info-row"><span class="key">Task</span><span class="val">${escapeHtml(r.task || '—')}</span></div>
        <div class="info-row"><span class="key">Profile</span><span class="val">${escapeHtml(r.profile || 'default')}</span></div>
        <div class="info-row"><span class="key">Threshold</span><span class="val">${escapeHtml(r.threshold || '—')}</span></div>
        <div class="info-row"><span class="key">Max iter</span><span class="val">3</span></div>
        <div class="info-row"><span class="key">Escalation</span><span class="val">accept-with-notes</span></div>`
    });

    // 3. Brief
    if (r.brief_b64) {
      const briefMd = decode(r.brief_b64);
      const briefFile = r.brief_filename || `${r.task}.md`;
      events.push({
        kind: 'brief',
        action: 'Brief',
        title: `briefs/${briefFile} loaded (${briefMd.split(/\s+/).length} words)`,
        timestamp: r.brief_mtime || r.start_epoch + 2,
        body: `<div class="info-row"><span class="key">Path</span><span class="val">briefs/${escapeHtml(briefFile)}</span></div>
          ${expandable('View full brief', renderMd(briefMd))}`
      });
    }

    // 4. Rubric
    if (r.rubric_b64) {
      const rubricMd = decode(r.rubric_b64);
      const rubricFile = r.rubric_filename || `${r.task}-rubric.md`;
      events.push({
        kind: 'rubric',
        action: 'Rubric',
        title: `rubrics/${rubricFile} generated`,
        timestamp: r.rubric_mtime || r.start_epoch + 3,
        body: `<div class="info-row"><span class="key">Path</span><span class="val">rubrics/${escapeHtml(rubricFile)}</span></div>
          ${expandable('View full rubric', renderMd(rubricMd))}`
      });
    }

    // 5+. Per-iteration events
    const fbs = (r.feedbacks || []).slice().sort((a, b) => a.iter - b.iter);
    fbs.forEach((fb, idx) => {
      const isPass = fb.verdict === 'PASS';
      const verdictBadge = `<span class="badge ${isPass ? 'pass' : 'fail'}">${escapeHtml(fb.verdict || '?')}</span>`;
      const fillPct = Math.min(100, Math.max(0, ((fb.score ?? 0) / 10) * 100));
      const fbContent = decode(fb.content_b64);

      // Iteration header event
      events.push({
        kind: 'iter',
        action: `Iter ${fb.iter}`,
        title: `Iteration ${fb.iter} started`,
        timestamp: idx === 0 ? r.start_epoch + 5 : (fbs[idx - 1].mtime || 0) + 1,
        body: `<div class="info-row"><span class="key">Iteration</span><span class="val mono">${fb.iter} / 3</span></div>
          ${idx > 0 ? `<div class="info-row"><span class="key">Reads feedback</span><span class="val">feedback-${String(fb.iter - 1).padStart(3,'0')}.md (${fbs[idx-1].score?.toFixed(2)}/10)</span></div>` : '<div class="info-row"><span class="key">Reads feedback</span><span class="val">— (first iter)</span></div>'}
          <div class="info-row"><span class="key">Reads brief</span><span class="val">briefs/${escapeHtml(r.task)}.md</span></div>
          <div class="info-row"><span class="key">Reads rubric</span><span class="val">rubrics/${escapeHtml(r.task)}-rubric.md</span></div>`
      });

      // Generator wrote draft
      const isLastIter = idx === fbs.length - 1;
      const finalStateMd = isLastIter ? decode(r.state_b64) : '';
      const iterDraftMd = decode(fb.iter_draft_b64 || '');
      const iterStateMd = decode(fb.iter_state_b64 || '');
      const finalDraftMd = isLastIter ? decode(r.draft_b64) : '';
      const padIter = String(fb.iter).padStart(3, '0');

      let genBody = `<div class="info-row"><span class="key">Agent</span><span class="val">gan-generator</span></div>
        <div class="info-row"><span class="key">Output</span><span class="val">${r.id}/draft.md</span></div>
        <div class="info-row"><span class="key">State</span><span class="val">${r.id}/generator-state.md</span></div>
        ${idx > 0 ? '<div class="info-row"><span class="key">Strategy</span><span class="val">Apply feedback critical → major → minor</span></div>' : '<div class="info-row"><span class="key">Strategy</span><span class="val">First-iter draft from brief + rubric</span></div>'}`;

      if (iterDraftMd) {
        // Per-iter snapshot exists (loop-operator patched)
        genBody += `<div class="info-row"><span class="key">Snapshot</span><span class="val">drafts/draft-iter-${padIter}.md (${fb.iter_draft_words} words)</span></div>`;
        genBody += expandable(`View draft.md after iter ${fb.iter}`, renderMd(iterDraftMd));
        if (iterStateMd) {
          genBody += expandable(`View generator-state.md after iter ${fb.iter}`, renderMd(iterStateMd));
        }
      } else if (isLastIter) {
        // No snapshot but this is the last iter → final draft IS what generator wrote here
        genBody += `<div class="info-row"><span class="key">Snapshot</span><span class="val" style="color:var(--text-faint);">Per-iter snapshots not retained for older runs. Showing final draft (= generator output of last iter).</span></div>`;
        if (finalDraftMd) genBody += expandable(`View final draft.md (= last iter generator output)`, renderMd(finalDraftMd));
        if (finalStateMd) genBody += expandable(`View generator-state.md (final)`, renderMd(finalStateMd));
      } else {
        genBody += `<div class="info-row" style="margin-top:8px;"><span class="key" style="color:var(--text-faint);">Note</span><span class="val" style="color:var(--text-faint);font-size:11px;">Per-iter snapshot unavailable — overwritten by next iteration. Newer runs (with patched loop-operator) retain drafts/draft-iter-NNN.md per iter.</span></div>`;
      }

      events.push({
        kind: 'generator',
        action: 'Generator',
        title: `gan-generator wrote draft.md (iter ${fb.iter})${iterDraftMd ? ' — ' + fb.iter_draft_words + ' words' : ''}`,
        timestamp: (fb.mtime || r.start_epoch) - 30,
        body: genBody
      });

      // Evaluator scored
      events.push({
        kind: 'evaluator',
        action: 'Evaluator',
        title: `codex review scored draft (feedback-${String(fb.iter).padStart(3,'0')}.md)`,
        timestamp: fb.mtime || (r.start_epoch + 60 * fb.iter),
        body: `<div class="info-row"><span class="key">Output</span><span class="val">feedback/feedback-${String(fb.iter).padStart(3,'0')}.md</span></div>
          <div class="info-row"><span class="key">Words</span><span class="val">${fb.words ?? '?'}</span></div>
          <div class="score-bar">
            <div class="score-bar-track"><div class="score-bar-fill" style="width:${fillPct}%"></div></div>
            <div class="score-bar-val" style="color:${scoreColor(fb.score)}">${fb.score?.toFixed(2) ?? '?'}/10</div>
            ${verdictBadge}
          </div>
          ${scoreTableHtml(fb.breakdown)}
          ${issueCountsHtml(fb.issues)}
          ${expandable('View full feedback (evaluator output)', renderMd(fbContent))}`
      });

      // Score check
      events.push({
        kind: isPass ? 'score-pass' : 'score-fail',
        action: isPass ? 'Pass' : 'Reject',
        title: isPass ? `Score ${fb.score?.toFixed(2)} ≥ threshold → loop break` : `Score ${fb.score?.toFixed(2)} < threshold → continue`,
        timestamp: (fb.mtime || 0) + 1,
        body: `<div class="info-row"><span class="key">Score</span><span class="val mono" style="color:${scoreColor(fb.score)}">${fb.score?.toFixed(2)}/10</span></div>
          <div class="info-row"><span class="key">Threshold</span><span class="val mono">${r.threshold || (r.profile === 'code' ? '9.0' : '8.5')}</span></div>
          <div class="info-row"><span class="key">Verdict</span><span class="val">${escapeHtml(fb.verdict || '?')}</span></div>
          <div class="info-row"><span class="key">Decision</span><span class="val">${isPass ? 'Loop exits with PASS' : (fb.iter >= 3 ? 'Max iterations reached → escalation' : 'Continue to next iteration')}</span></div>`
      });
    });

    // Final-cleanup pass
    if (r.cleanup_status && r.cleanup_status.toUpperCase().includes('APPLIED')) {
      const stateMd = decode(r.state_b64);
      const cleanupMatch = stateMd.match(/(?:Final Cleanup Applied|Final-Cleanup Applied)[\s\S]*$/);
      const cleanupContent = cleanupMatch ? cleanupMatch[0] : 'See generator-state.md for details.';
      events.push({
        kind: 'cleanup',
        action: 'Cleanup',
        title: `Final-cleanup pass applied (post-loop polish)`,
        timestamp: (r.end_epoch || 0) - 5,
        body: `<div class="info-row"><span class="key">Trigger</span><span class="val">Step 2.5 — applies last feedback without re-scoring</span></div>
          <div class="info-row"><span class="key">Reads</span><span class="val">feedback-${String(fbs.length).padStart(3,'0')}.md (last evaluator output)</span></div>
          <div class="info-row"><span class="key">Constraint</span><span class="val">No new content, surgical edits only</span></div>
          ${expandable('View cleanup items addressed', renderMd(cleanupContent), {open: true})}`
      });
    }

    // Output
    const draftMd = decode(r.draft_b64);
    const summaryMd = decode(r.summary_b64);
    events.push({
      kind: 'output',
      action: 'Output',
      title: `draft.md finalized (${r.draft_stats?.words ?? '?'} words, ${r.draft_stats?.lines ?? '?'} lines)`,
      timestamp: r.end_epoch || 0,
      body: `<div class="info-row"><span class="key">Path</span><span class="val">${escapeHtml(r.id)}/draft.md</span></div>
        <div class="info-row"><span class="key">Words</span><span class="val mono">${r.draft_stats?.words ?? '?'}</span></div>
        <div class="info-row"><span class="key">Lines</span><span class="val mono">${r.draft_stats?.lines ?? '?'}</span></div>
        <div class="info-row"><span class="key">Bytes</span><span class="val mono">${r.draft_stats?.bytes ?? '?'}</span></div>
        ${summaryMd ? expandable('View run-summary.md', renderMd(summaryMd)) : ''}
        ${draftMd ? expandable('View final draft.md (also shown in left panel)', renderMd(draftMd)) : ''}`
    });

    // Loop exit
    const verdictKind = r.verdict === 'PASS' ? 'score-pass' : (r.verdict === 'accept-with-notes' ? 'cleanup' : 'score-fail');
    events.push({
      kind: 'exit',
      action: 'Exit',
      title: `Run complete — verdict: ${r.verdict || '?'}`,
      timestamp: (r.end_epoch || 0) + 1,
      body: `<div class="info-row"><span class="key">Final score</span><span class="val mono" style="color:${scoreColor(r.score)}">${r.score?.toFixed(2)}/10</span></div>
        <div class="info-row"><span class="key">Verdict</span><span class="val">${escapeHtml(r.verdict || '?')}</span></div>
        <div class="info-row"><span class="key">Iterations</span><span class="val mono">${escapeHtml(r.iterations || '?')}</span></div>
        ${r.cleanup_status ? `<div class="info-row"><span class="key">Cleanup</span><span class="val">${escapeHtml(r.cleanup_status)}</span></div>` : ''}
        <div class="info-row"><span class="key">Run-summary</span><span class="val">${escapeHtml(r.id)}/run-summary.md</span></div>`
    });

    return events;
  };

  const eventHtml = ev => {
    return `<div class="event" data-kind="${ev.kind}">
      <div class="event-rail">
        <div class="event-dot"></div>
        <div class="event-line"></div>
      </div>
      <div class="event-card" data-open="true">
        <div class="event-head" onclick="this.parentElement.dataset.open=this.parentElement.dataset.open==='true'?'false':'true'">
          <span class="event-action">${escapeHtml(ev.action)}</span>
          <span class="event-title">${ev.title}</span>
          <span class="event-meta mono">${fmtTime(ev.timestamp)}</span>
          <span class="event-toggle">▾</span>
        </div>
        <div class="event-body">${ev.body || ''}</div>
      </div>
    </div>`;
  };

  const renderRun = idx => {
    const r = runs[idx];
    if (!r) return;

    // Header meta + badges
    meta.innerHTML = `<strong>${escapeHtml(r.task ?? r.id)}</strong> · ${escapeHtml(r.date ?? '')} · iter ${escapeHtml(r.iterations ?? '?')}`;
    const verdictClass = r.verdict === 'PASS' ? 'pass' : (r.verdict === 'accept-with-notes' ? 'warn' : 'fail');
    badges.innerHTML = `
      <span class="badge ${verdictClass}">${escapeHtml(r.verdict ?? '?')}</span>
      <span class="meta" style="margin-left: 10px;">Score <strong>${r.score?.toFixed(2) ?? '?'}/10</strong></span>
    `;

    // Left panel: rendered draft
    const draft = decode(r.draft_b64);
    if (draft && draft.length > 0) {
      draftView.innerHTML = renderMd(draft);
      Prism.highlightAllUnder(draftView);
    } else {
      draftView.innerHTML = '<div class="empty">No draft.md found.</div>';
    }

    // Right panel: workflow overview + event timeline
    const fbs = (r.feedbacks || []).slice().sort((a, b) => a.iter - b.iter);
    const elapsed = (r.end_epoch && r.start_epoch) ? (r.end_epoch - r.start_epoch) : 0;
    const verdictPillClass = r.verdict === 'PASS' ? 'pill--pass' : (r.verdict === 'accept-with-notes' ? 'pill--warn' : 'pill--fail');

    let html = `<div class="workflow-overview">
      <div class="workflow-metrics">
        <div class="metric">
          <span class="metric-label">Iterations</span>
          <span class="metric-value">${escapeHtml(r.iterations || '?')}</span>
        </div>
        <div class="metric">
          <span class="metric-label">Final Score</span>
          <span class="metric-value" style="color:${scoreColor(r.score)}">${r.score?.toFixed(2) ?? '?'}/10</span>
        </div>
        <div class="metric">
          <span class="metric-label">Elapsed</span>
          <span class="metric-value">${fmtDuration(elapsed)}</span>
        </div>
        <div class="metric">
          <span class="metric-label">Profile</span>
          <span class="metric-value">${escapeHtml(r.profile || '—')}</span>
        </div>
        <div class="metric metric-right">
          <span class="metric-pill ${verdictPillClass}">${escapeHtml(r.verdict || '?')}</span>
        </div>
      </div>
    </div>`;

    html += '<div class="timeline-section-header">EVENT STREAM</div>';
    html += '<div class="timeline">';
    const events = buildEvents(r);
    events.forEach(ev => { html += eventHtml(ev); });
    html += '</div>';

    timelineView.innerHTML = html;
    Prism.highlightAllUnder(timelineView);
  };

  select.addEventListener('change', e => renderRun(parseInt(e.target.value, 10)));
  document.querySelectorAll('.view-toggle button').forEach(btn => {
    btn.addEventListener('click', () => {
      document.body.dataset.view = btn.dataset.view;
      document.querySelectorAll('.view-toggle button').forEach(b => b.classList.toggle('active', b === btn));
    });
  });

  // initial
  renderRun(0);
})();
</script>
</body>
</html>
