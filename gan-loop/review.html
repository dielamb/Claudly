<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>GAN Loop</title>
<style>
/* ── Tokens ───────────────────────────────────────────────────────── */
:root {
  --bg:     oklch(10% 0.006 30);
  --surf:   oklch(13% 0.006 30);
  --surf2:  oklch(16% 0.006 30);
  --surf3:  oklch(19% 0.005 30);
  --text:   oklch(86% 0.01 60);
  --muted:  oklch(52% 0.008 50);
  --faint:  oklch(30% 0.005 40);
  --sep:    oklch(20% 0.005 30);
  --orange: oklch(63% 0.21 38);
  --green:  oklch(72% 0.18 162);
  --red:    oklch(57% 0.19 25);
  --yellow: oklch(84% 0.17 88);
  --sans: system-ui, -apple-system, sans-serif;
  --mono: 'SF Mono', 'Fira Code', 'Cascadia Code', monospace;
  /* spacing */
  --s4:4px; --s8:8px; --s12:12px; --s16:16px; --s24:24px; --s32:32px;
}

/* ── Reset ────────────────────────────────────────────────────────── */
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
html { height: 100%; }
body {
  background: var(--bg);
  color: var(--text);
  font-family: var(--sans);
  font-size: 13px;
  line-height: 1.6;
  height: 100%;
  -webkit-font-smoothing: antialiased;
}
button { font-family: inherit; cursor: pointer; border: none; background: none; }
a { color: inherit; text-decoration: none; }
::-webkit-scrollbar { width: 4px; height: 4px; }
::-webkit-scrollbar-track { background: transparent; }
::-webkit-scrollbar-thumb { background: var(--faint); border-radius: 2px; }

/* ── Layout ───────────────────────────────────────────────────────── */
.app { display: grid; grid-template-rows: 40px 1fr; grid-template-columns: 260px 1fr; height: 100vh; }

/* ── Header ───────────────────────────────────────────────────────── */
.hdr {
  grid-column: 1 / -1;
  display: flex; align-items: center; justify-content: space-between;
  padding: 0 var(--s16);
  border-bottom: 1px solid var(--sep);
  background: var(--surf);
  position: sticky; top: 0; z-index: 50;
}
.hdr__title {
  font-size: 10px; font-weight: 700;
  letter-spacing: .22em; text-transform: uppercase;
  color: var(--muted);
  display: flex; align-items: center; gap: var(--s8);
}
.hdr__title::before {
  content: '';
  width: 6px; height: 6px; border-radius: 50%;
  background: var(--orange);
}
.hdr__meta {
  font-family: var(--mono); font-size: 10px;
  color: var(--faint);
}
.hdr__run-count {
  font-family: var(--mono); font-size: 10px;
  color: var(--muted);
  padding: 2px 6px; border-radius: 3px;
  background: var(--surf2);
}

/* ── Sidebar ──────────────────────────────────────────────────────── */
.sidebar {
  border-right: 1px solid var(--sep);
  display: flex; flex-direction: column;
  overflow: hidden;
}
.sidebar__header {
  padding: var(--s12) var(--s16) var(--s8);
  border-bottom: 1px solid var(--sep);
  flex-shrink: 0;
}
.sidebar__label {
  font-size: 9px; font-weight: 700;
  letter-spacing: .2em; text-transform: uppercase;
  color: var(--faint);
}
.sidebar__list {
  flex: 1; overflow-y: auto;
  padding: var(--s4) 0;
}

/* ── Run items ────────────────────────────────────────────────────── */
.run-item {
  display: grid;
  grid-template-columns: 8px 1fr auto;
  grid-template-rows: auto auto;
  gap: 0 var(--s8);
  padding: var(--s8) var(--s12) var(--s8) var(--s16);
  cursor: pointer;
  position: relative;
  transition: background .1s;
}
.run-item:hover { background: var(--surf2); }
.run-item.active { background: var(--surf2); }
.run-item.active::before {
  content: '';
  position: absolute; left: 0; top: 0; bottom: 0; width: 2px;
  background: var(--orange);
}
.run-item__dot {
  grid-row: 1 / 3; align-self: center;
  width: 6px; height: 6px; border-radius: 50%; flex-shrink: 0;
}
.run-item__dot.pass { background: var(--green); }
.run-item__dot.fail { background: var(--red); box-shadow: 0 0 0 2px oklch(from var(--red) l c h / 0.15); }
.run-item__dot.unknown { background: var(--faint); }
.run-item__name {
  font-size: 11px; font-weight: 600; color: var(--text);
  white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
  line-height: 1.3;
}
.run-item__score-badge {
  font-family: var(--mono); font-size: 10px; font-weight: 700;
  grid-row: 1;
  line-height: 1.3;
}
.run-item__score-badge.pass { color: var(--green); }
.run-item__score-badge.fail { color: var(--red); }
.run-item__score-badge.unknown { color: var(--faint); }
.run-item__date {
  font-family: var(--mono); font-size: 9px;
  color: var(--faint);
  white-space: nowrap;
}
.run-item__date-score {
  display: flex; align-items: center; gap: var(--s8);
}

/* ── Load more ────────────────────────────────────────────────────── */
.load-more {
  margin: var(--s8) var(--s16);
  padding: var(--s8) var(--s12);
  font-size: 10px; font-weight: 600;
  color: var(--muted);
  border: 1px solid var(--sep);
  border-radius: 4px;
  width: calc(100% - 32px);
  text-align: center;
  transition: all .15s;
}
.load-more:hover { color: var(--text); border-color: var(--orange); }

/* ── Main ─────────────────────────────────────────────────────────── */
.main {
  overflow-y: auto;
  display: flex; flex-direction: column;
}

/* ── Empty state ──────────────────────────────────────────────────── */
.empty {
  flex: 1; display: flex; flex-direction: column;
  align-items: center; justify-content: center;
  gap: var(--s8);
}
.empty__glyph {
  font-family: var(--mono); font-size: 24px;
  color: var(--faint); letter-spacing: -.04em; line-height: 1;
}
.empty__title { font-size: 12px; font-weight: 600; color: var(--muted); }
.empty__sub { font-size: 11px; color: var(--faint); }

/* ── Run view ─────────────────────────────────────────────────────── */
.run-view { padding: var(--s24) var(--s32); max-width: 900px; }

/* ── Status bar ───────────────────────────────────────────────────── */
.status-bar {
  display: flex; align-items: flex-start;
  justify-content: space-between; gap: var(--s24);
  margin-bottom: var(--s24);
  padding-bottom: var(--s24);
  border-bottom: 1px solid var(--sep);
}
.status-bar__task-label {
  font-size: 9px; font-weight: 700;
  letter-spacing: .2em; text-transform: uppercase;
  color: var(--faint); margin-bottom: var(--s4);
}
.status-bar__task-name {
  font-size: 17px; font-weight: 700;
  letter-spacing: -.02em; color: var(--text);
  line-height: 1.2;
}

/* Score readout — NOT a hero, a readout */
.score-readout {
  display: flex; align-items: baseline; gap: var(--s8);
  flex-shrink: 0;
}
.score-readout__num {
  font-family: var(--mono); font-size: 28px; font-weight: 700;
  letter-spacing: -.04em; line-height: 1;
}
.score-readout__num.pass { color: var(--green); }
.score-readout__num.fail { color: var(--red); }
.score-readout__denom {
  font-family: var(--mono); font-size: 13px;
  color: var(--faint); font-weight: 400;
}
.score-readout__verdict {
  padding: 3px 9px; border-radius: 3px;
  font-size: 10px; font-weight: 700;
  letter-spacing: .12em; text-transform: uppercase;
}
.score-readout__verdict.pass {
  background: oklch(from var(--green) l c h / 0.12);
  color: var(--green);
}
.score-readout__verdict.fail {
  background: oklch(from var(--red) l c h / 0.12);
  color: var(--red);
}

/* ── Info strip ───────────────────────────────────────────────────── */
.info-strip {
  display: flex; gap: 1px;
  background: var(--sep);
  border: 1px solid var(--sep);
  border-radius: 5px; overflow: hidden;
  margin-bottom: var(--s16);
}
.info-cell {
  background: var(--surf);
  padding: var(--s8) var(--s16); flex: 1;
}
.info-cell__l {
  font-size: 9px; font-weight: 700;
  letter-spacing: .12em; text-transform: uppercase;
  color: var(--faint); margin-bottom: 2px;
}
.info-cell__v {
  font-size: 12px; font-weight: 600; color: var(--text);
  font-family: var(--mono);
}
.info-cell__v.orange { color: var(--orange); }
.info-cell__v.green { color: var(--green); }
.info-cell--sev { cursor: default; }
.sev-counts { display: flex; gap: var(--s8); margin-top: 2px; }
.sev-pip {
  font-size: 10px; font-weight: 700;
  padding: 1px 6px; border-radius: 2px;
}
.sev-pip.crit { background: oklch(from var(--red) l c h / 0.12); color: var(--red); }
.sev-pip.major { background: oklch(from var(--yellow) l c h / 0.12); color: var(--yellow); }
.sev-pip.minor { background: var(--surf2); color: var(--muted); }

/* ── Tabs ─────────────────────────────────────────────────────────── */
.tabs {
  display: flex; gap: 0;
  border-bottom: 1px solid var(--sep);
  margin-bottom: var(--s16);
}
.tab {
  padding: var(--s8) var(--s16);
  font-size: 11px; font-weight: 500;
  color: var(--muted); cursor: pointer;
  border-bottom: 2px solid transparent;
  margin-bottom: -1px;
  transition: color .15s;
  display: flex; align-items: center; gap: var(--s4);
}
.tab:hover { color: var(--text); }
.tab.active { color: var(--text); border-bottom-color: var(--orange); font-weight: 600; }
.tab-badge {
  font-size: 9px; font-weight: 700;
  padding: 1px 5px; border-radius: 2px;
  background: oklch(from var(--red) l c h / 0.12);
  color: var(--red);
}
.tab-badge.warn {
  background: oklch(from var(--yellow) l c h / 0.12);
  color: var(--yellow);
}
.tab-panel { display: none; }
.tab-panel.active { display: block; }

/* ── Iteration sub-tabs (feedback rounds) ─────────────────────────── */
.round-tabs {
  display: flex; gap: var(--s4);
  margin-bottom: var(--s12);
}
.round-tab {
  padding: 4px 10px; border-radius: 3px;
  font-size: 10px; font-weight: 600;
  color: var(--muted); cursor: pointer;
  background: var(--surf2);
  transition: all .15s;
}
.round-tab:hover { color: var(--text); }
.round-tab.active { background: var(--surf3); color: var(--text); }

/* ── Card ─────────────────────────────────────────────────────────── */
.card {
  background: var(--surf);
  border: 1px solid var(--sep);
  border-radius: 5px; overflow: hidden;
  margin-bottom: var(--s12);
}
.card__hdr {
  padding: var(--s8) var(--s16);
  border-bottom: 1px solid var(--sep);
  display: flex; align-items: center; justify-content: space-between;
}
.card__title {
  font-size: 9px; font-weight: 700;
  letter-spacing: .14em; text-transform: uppercase;
  color: var(--faint);
}
.card__body { padding: var(--s16); }

/* ── Copy button ──────────────────────────────────────────────────── */
.copy-btn {
  font-size: 9px; font-weight: 600;
  letter-spacing: .06em; text-transform: uppercase;
  padding: 3px 8px; border-radius: 3px;
  border: 1px solid var(--sep);
  color: var(--muted);
  transition: all .15s;
}
.copy-btn:hover { color: var(--text); border-color: var(--orange); }
.copy-btn.copied { color: var(--green); border-color: var(--green); }

/* ── Score table ──────────────────────────────────────────────────── */
.score-table { width: 100%; border-collapse: collapse; }
.score-table th {
  font-size: 9px; font-weight: 700;
  letter-spacing: .1em; text-transform: uppercase;
  color: var(--faint); text-align: left;
  padding: 5px var(--s8);
  border-bottom: 1px solid var(--sep);
}
.score-table td {
  padding: var(--s8) var(--s8);
  font-size: 12px; color: var(--text);
  border-bottom: 1px solid var(--sep);
  vertical-align: middle;
}
.score-table tr:last-child td { border-bottom: none; font-weight: 700; }
.score-table tr:hover td { background: oklch(from var(--text) l c h / 0.02); }
.score-num {
  font-family: var(--mono); font-weight: 700;
}
.score-num.hi { color: var(--green); }
.score-num.mid { color: var(--yellow); }
.score-num.lo { color: var(--red); }
.bar-wrap { display: flex; align-items: center; gap: var(--s8); min-width: 80px; }
.bar-track { flex: 1; height: 4px; background: var(--surf3); border-radius: 2px; }
.bar-fill { height: 100%; border-radius: 2px; transition: width .3s ease-out; }
.bar-fill.hi { background: var(--green); }
.bar-fill.mid { background: var(--yellow); }
.bar-fill.lo { background: var(--red); }

/* ── Feedback items — NO border-left stripes ─────────────────────── */
.fb-round { display: none; }
.fb-round.active { display: block; }
.fb-item {
  padding: var(--s12) var(--s16);
  border-radius: 4px;
  margin-bottom: var(--s8);
  background: var(--surf2);
}
.fb-item.critical { background: oklch(from var(--red) l c h / 0.06); }
.fb-item.major { background: oklch(from var(--yellow) l c h / 0.04); }
.fb-item__header { display: flex; align-items: center; gap: var(--s8); margin-bottom: var(--s8); }
.fb-sev {
  font-size: 8px; font-weight: 700;
  letter-spacing: .14em; text-transform: uppercase;
  padding: 2px 6px; border-radius: 2px;
  flex-shrink: 0;
}
.fb-sev.critical { background: oklch(from var(--red) l c h / 0.15); color: var(--red); }
.fb-sev.major { background: oklch(from var(--yellow) l c h / 0.15); color: var(--yellow); }
.fb-sev.minor { background: var(--surf3); color: var(--muted); }
.fb-title { font-size: 12px; font-weight: 600; color: var(--text); line-height: 1.3; }

/* ── Draft panel ──────────────────────────────────────────────────── */
.draft-toolbar {
  display: flex; align-items: center; justify-content: space-between;
  padding: var(--s8) var(--s16);
  background: var(--surf2);
  border-bottom: 1px solid var(--sep);
  gap: var(--s12);
}
.draft-meta { font-family: var(--mono); font-size: 9px; color: var(--faint); }
.draft-actions { display: flex; gap: var(--s8); align-items: center; }
.view-toggle { display: flex; border: 1px solid var(--sep); border-radius: 3px; overflow: hidden; }
.view-btn {
  font-size: 9px; font-weight: 600; letter-spacing: .06em; text-transform: uppercase;
  padding: 3px 8px; color: var(--muted);
  transition: all .15s;
}
.view-btn.active { background: var(--surf3); color: var(--text); }
.draft-content { max-height: 60vh; overflow-y: auto; }
.draft-raw { padding: var(--s16); font-family: var(--mono); font-size: 12px; line-height: 1.65; white-space: pre-wrap; word-break: break-word; color: var(--text); }
.draft-rendered { padding: var(--s16); }
.draft-raw-view { display: block; }
.draft-md-view { display: none; }

/* ── Prose ────────────────────────────────────────────────────────── */
.prose { font-size: 12px; line-height: 1.7; color: var(--text); }
.prose h2 { font-size: 13px; font-weight: 700; color: var(--text); margin: var(--s16) 0 var(--s8); }
.prose h3 { font-size: 10px; font-weight: 700; letter-spacing: .1em; text-transform: uppercase; color: var(--muted); margin: var(--s12) 0 var(--s4); }
.prose p { margin-bottom: var(--s8); }
.prose ul, .prose ol { padding-left: var(--s16); margin-bottom: var(--s8); }
.prose li { margin-bottom: 2px; }
.prose code { font-family: var(--mono); font-size: 11px; background: var(--surf2); padding: 1px 5px; border-radius: 3px; color: var(--orange); }
.prose pre { background: var(--surf2); border: 1px solid var(--sep); border-radius: 4px; padding: var(--s12); overflow-x: auto; margin: var(--s8) 0; }
.prose pre code { background: none; padding: 0; color: var(--text); font-size: 12px; }
.prose table { width: 100%; border-collapse: collapse; margin: var(--s8) 0; font-size: 11px; }
.prose th { background: var(--surf2); padding: 5px var(--s8); text-align: left; font-weight: 700; border: 1px solid var(--sep); color: var(--muted); font-size: 9px; letter-spacing: .08em; text-transform: uppercase; }
.prose td { padding: 5px var(--s8); border: 1px solid var(--sep); }
.prose strong { font-weight: 700; color: var(--text); }
.prose hr { border: none; border-top: 1px solid var(--sep); margin: var(--s12) 0; }
.prose blockquote { padding-left: var(--s12); color: var(--muted); margin: var(--s8) 0; border-left: 1px solid var(--sep); }

/* ── Error state ──────────────────────────────────────────────────── */
.error-banner {
  margin-bottom: var(--s12);
  padding: var(--s8) var(--s12);
  background: oklch(from var(--red) l c h / 0.07);
  border: 1px solid oklch(from var(--red) l c h / 0.2);
  border-radius: 4px;
  font-size: 11px; color: var(--red);
  display: flex; align-items: center; gap: var(--s8);
}
.error-banner::before { content: '!'; font-weight: 700; font-family: var(--mono); flex-shrink: 0; }

/* ── Loading ──────────────────────────────────────────────────────── */
.loading {
  color: var(--faint); font-size: 11px;
  padding: var(--s24); text-align: center;
  font-family: var(--mono); letter-spacing: .04em;
}
</style>
</head>
<body>

<div class="app">

  <!-- ── Header ─────────────────────────────────────────────────── -->
  <header class="hdr">
    <div class="hdr__title">GAN Loop</div>
    <div style="display:flex;align-items:center;gap:8px;">
      <span class="hdr__run-count" id="run-count">loading</span>
      <span class="hdr__meta" id="run-id"></span>
    </div>
  </header>

  <!-- ── Sidebar ────────────────────────────────────────────────── -->
  <aside class="sidebar">
    <div class="sidebar__header">
      <span class="sidebar__label">Runs</span>
    </div>
    <div class="sidebar__list" id="run-list">
      <div class="loading">...</div>
    </div>
  </aside>

  <!-- ── Main ───────────────────────────────────────────────────── -->
  <main class="main" id="main">
    <div class="empty">
      <div class="empty__glyph">◎</div>
      <div class="empty__title">Select a run</div>
      <div class="empty__sub" id="empty-sub">Loading runs...</div>
    </div>
  </main>

</div>

<script>
// ── Minimal markdown ───────────────────────────────────────────────
function md(t) {
  if (!t) return '';
  return t
    .replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;')
    .replace(/```(\w*)\n([\s\S]*?)```/g,(_,l,c)=>`<pre><code class="${l}">${c.trim()}</code></pre>`)
    .replace(/`([^`]+)`/g,'<code>$1</code>')
    .replace(/^### (.+)$/gm,'<h3>$1</h3>')
    .replace(/^## (.+)$/gm,'<h2>$1</h2>')
    .replace(/^# (.+)$/gm,'<h2>$1</h2>')
    .replace(/^---+$/gm,'<hr>')
    .replace(/\*\*(.+?)\*\*/g,'<strong>$1</strong>')
    .replace(/^> (.+)$/gm,'<blockquote>$1</blockquote>')
    .replace(/^\|(.+)\|$/gm,row=>{
      const cells=row.split('|').filter((_,i,a)=>i>0&&i<a.length-1);
      if(cells.every(c=>/^[-: ]+$/.test(c)))return'';
      return '<tr>'+cells.map(c=>`<td>${c.trim()}</td>`).join('')+'</tr>';
    })
    .replace(/(<tr>[\s\S]*?<\/tr>)/g,m=>`<table>${m}</table>`)
    .replace(/^[-*] (.+)$/gm,'<li>$1</li>')
    .replace(/(<li>.*<\/li>\n?)+/g,m=>`<ul>${m}</ul>`)
    .replace(/^\d+\. (.+)$/gm,'<li>$1</li>')
    .replace(/\n\n/g,'</p><p>')
    .replace(/^(?!<[a-z])(.+)$/gm,'$1')
    .replace(/\n/g,' ');
}

// ── Fetch ──────────────────────────────────────────────────────────
async function getText(url) {
  try {
    const r = await fetch(url);
    if (!r.ok) return null;
    return await r.text();
  } catch { return null; }
}

// ── Parse summary ──────────────────────────────────────────────────
function parseSummary(text) {
  if (!text) return null;
  const get = k => { const m=text.match(new RegExp(`^${k}:\\s*(.+)$`,'m')); return m?m[1].trim():null; };
  return {
    task: get('Task'),
    date: get('Date'),
    profile: get('Profile'),
    iterations: get('Iterations'),
    score: parseFloat(get('Final score')) || 0,
    verdict: get('Verdict'),
    raw: text
  };
}

// ── Parse feedback ─────────────────────────────────────────────────
function parseFeedback(text) {
  if (!text) return null;
  const items = [];
  const blocks = text.split(/\n(?=#{2,3} )/);
  for (const block of blocks) {
    const m = block.match(/^#{2,3} (.+)\n([\s\S]*)/);
    if (!m) continue;
    const title = m[1].trim();
    const body = m[2].trim();
    if (/score|breakdown|verdict|what improved|score json/i.test(title)) continue;
    let severity = 'minor';
    if (/critical/i.test(title)) severity = 'critical';
    else if (/major/i.test(title)) severity = 'major';
    items.push({ title: title.replace(/^(Critical|Major|Minor)\s*#?\d*\s*[-:]\s*/i,'').replace(/^#+\s*/,''), body, severity });
  }
  return { raw: text, items };
}

// ── Load all feedback rounds ───────────────────────────────────────
async function loadFeedbackRounds(base) {
  const rounds = [];
  for (let i = 1; i <= 5; i++) {
    const n = String(i).padStart(3,'0');
    const text = await getText(`${base}/feedback/feedback-${n}.md`);
    if (!text) break;
    rounds.push({ round: i, data: parseFeedback(text), raw: text });
  }
  return rounds;
}

// ── Load run ───────────────────────────────────────────────────────
async function loadRun(runId) {
  const base = `/runs/${runId}`;
  const [summaryText, draft, rubric] = await Promise.all([
    getText(`${base}/run-summary.md`),
    getText(`${base}/draft.md`),
    (async () => {
      const s = await getText(`${base}/run-summary.md`);
      if (!s) return null;
      const task = (s.match(/^Task:\s*(.+)$/m)||[])[1]?.trim();
      return task ? await getText(`/rubrics/${task}-rubric.md`) : null;
    })()
  ]);
  const feedbackRounds = await loadFeedbackRounds(base);
  return { summary: parseSummary(summaryText), draft, rubric, feedbackRounds, runId };
}

// ── Count feedback severities ──────────────────────────────────────
function countSeverities(rounds) {
  const counts = { critical: 0, major: 0, minor: 0 };
  for (const r of rounds) {
    for (const item of (r.data?.items || [])) {
      counts[item.severity] = (counts[item.severity]||0)+1;
    }
  }
  return counts;
}

// ── Copy text ──────────────────────────────────────────────────────
const _store = {};
function copyKey(key, btn) {
  navigator.clipboard.writeText(_store[key]||'').then(()=>{
    btn.textContent='Copied'; btn.classList.add('copied');
    setTimeout(()=>{ btn.textContent='Copy'; btn.classList.remove('copied'); },2000);
  });
}
function copyText(text, btn) {
  navigator.clipboard.writeText(text||'').then(()=>{
    btn.textContent='Copied'; btn.classList.add('copied');
    setTimeout(()=>{ btn.textContent='Copy'; btn.classList.remove('copied'); },2000);
  });
}

// ── Switch tabs ────────────────────────────────────────────────────
function switchTab(id, el) {
  el.closest('.tabs').querySelectorAll('.tab').forEach(t=>t.classList.remove('active'));
  el.classList.add('active');
  const container = el.closest('.run-view');
  container.querySelectorAll('.tab-panel').forEach(p=>p.classList.remove('active'));
  container.querySelector('#tab-'+id)?.classList.add('active');
}

// ── Switch feedback round ──────────────────────────────────────────
function switchRound(n, el) {
  el.closest('.round-tabs').querySelectorAll('.round-tab').forEach(t=>t.classList.remove('active'));
  el.classList.add('active');
  el.closest('.tab-panel').querySelectorAll('.fb-round').forEach(r=>r.classList.remove('active'));
  el.closest('.tab-panel').querySelector(`#fb-round-${n}`)?.classList.add('active');
}

// ── Toggle draft view ──────────────────────────────────────────────
function setDraftView(mode, btn) {
  btn.closest('.draft-toolbar').querySelectorAll('.view-btn').forEach(b=>b.classList.remove('active'));
  btn.classList.add('active');
  const panel = btn.closest('.tab-panel');
  panel.querySelector('.draft-raw-view').style.display = mode==='raw'?'block':'none';
  panel.querySelector('.draft-md-view').style.display = mode==='md'?'block':'none';
}

// ── Render run ─────────────────────────────────────────────────────
function renderRun(data) {
  const { summary, draft, rubric, feedbackRounds, runId } = data;

  if (!summary) {
    return `<div class="run-view"><div class="error-banner">Could not load run-summary.md for ${runId}</div></div>`;
  }

  const verdict = summary.verdict?.toUpperCase()==='PASS' ? 'pass' : 'fail';
  const sevCounts = countSeverities(feedbackRounds);

  // Score table from summary
  const stMatch = summary.raw.match(/## Score breakdown[\s\S]*?(\|[\s\S]*?)(?=\n##|$)/);
  const scoreTableHtml = stMatch
    ? buildScoreTable(stMatch[1])
    : '<div class="loading">No breakdown data</div>';

  // Feedback tab badge
  const hasCrit = sevCounts.critical > 0;
  const hasMajor = sevCounts.major > 0;
  const fbBadge = hasCrit
    ? `<span class="tab-badge">${sevCounts.critical} crit</span>`
    : hasMajor ? `<span class="tab-badge warn">${sevCounts.major} maj</span>` : '';

  // Feedback rounds
  const fbHtml = buildFeedbackRounds(feedbackRounds);

  // Draft
  const draftRaw = draft || '';
  const hasCodeBlocks = /```/.test(draftRaw);
  const draftHtml = draftRaw
    ? `<div class="draft-toolbar">
        <span class="draft-meta">${(draftRaw.length/1000).toFixed(1)}k chars · ${draftRaw.split('\n').length} lines</span>
        <div class="draft-actions">
          <div class="view-toggle">
            <button class="view-btn ${hasCodeBlocks?'active':''}" onclick="setDraftView('raw',this)">Raw</button>
            <button class="view-btn ${hasCodeBlocks?'':'active'}" onclick="setDraftView('md',this)">Markdown</button>
          </div>
          <button class="copy-btn" onclick="copyText(window._draft,this)">Copy</button>
        </div>
      </div>
      <div class="draft-content">
        <div class="draft-raw-view" style="display:${hasCodeBlocks?'block':'none'}">
          <div class="draft-raw">${escHtml(draftRaw)}</div>
        </div>
        <div class="draft-md-view" style="display:${hasCodeBlocks?'none':'block'}">
          <div class="draft-rendered"><div class="prose">${md(draftRaw)}</div></div>
        </div>
      </div>`
    : '<div class="loading">No draft.md found</div>';

  // Rubric
  const rubricHtml = rubric
    ? `<div class="card__hdr"><span class="card__title">Rubric</span><button class="copy-btn" onclick="copyText(window._rubric,this)">Copy</button></div>
       <div style="max-height:50vh;overflow-y:auto;padding:var(--s16)"><div class="prose">${md(rubric)}</div></div>`
    : '<div class="loading">No rubric found</div>';

  // Sev pips for info-strip
  const sevPips = [
    sevCounts.critical > 0 ? `<span class="sev-pip crit">${sevCounts.critical} crit</span>` : '',
    sevCounts.major > 0 ? `<span class="sev-pip major">${sevCounts.major} major</span>` : '',
    sevCounts.minor > 0 ? `<span class="sev-pip minor">${sevCounts.minor} minor</span>` : ''
  ].filter(Boolean).join('');

  document.getElementById('run-id').textContent = runId;
  window._draft = draftRaw;
  window._rubric = rubric || '';

  return `<div class="run-view">

    <div class="status-bar">
      <div>
        <div class="status-bar__task-label">GAN Loop Run</div>
        <div class="status-bar__task-name">${escHtml(summary.task || runId)}</div>
      </div>
      <div class="score-readout">
        <span class="score-readout__num ${verdict}">${summary.score.toFixed(2)}</span>
        <span class="score-readout__denom">/ 10</span>
        <span class="score-readout__verdict ${verdict}">${verdict.toUpperCase()}</span>
      </div>
    </div>

    <div class="info-strip">
      <div class="info-cell">
        <div class="info-cell__l">Profile</div>
        <div class="info-cell__v">${summary.profile || '-'}</div>
      </div>
      <div class="info-cell">
        <div class="info-cell__l">Iterations</div>
        <div class="info-cell__v orange">${summary.iterations || '-'}</div>
      </div>
      <div class="info-cell">
        <div class="info-cell__l">Date</div>
        <div class="info-cell__v">${summary.date || '-'}</div>
      </div>
      <div class="info-cell">
        <div class="info-cell__l">Score</div>
        <div class="info-cell__v ${verdict==='pass'?'green':''}">
          ${summary.score.toFixed(2)}
        </div>
      </div>
      ${sevPips ? `<div class="info-cell info-cell--sev">
        <div class="info-cell__l">Issues</div>
        <div class="sev-counts">${sevPips}</div>
      </div>` : ''}
    </div>

    <div class="tabs">
      <div class="tab active" onclick="switchTab('feedback',this)">Feedback ${fbBadge}</div>
      <div class="tab" onclick="switchTab('scores',this)">Scores</div>
      <div class="tab" onclick="switchTab('draft',this)">Draft</div>
      <div class="tab" onclick="switchTab('rubric',this)">Rubric</div>
    </div>

    <div class="tab-panel active" id="tab-feedback">
      ${fbHtml}
    </div>

    <div class="tab-panel" id="tab-scores">
      <div class="card">
        <div class="card__hdr"><span class="card__title">Score breakdown</span></div>
        <div class="card__body">${scoreTableHtml}</div>
      </div>
    </div>

    <div class="tab-panel" id="tab-draft">
      <div class="card" style="overflow:hidden">${draftHtml}</div>
    </div>

    <div class="tab-panel" id="tab-rubric">
      <div class="card" style="overflow:hidden">${rubricHtml}</div>
    </div>

  </div>`;
}

// ── Build feedback rounds UI ───────────────────────────────────────
function buildFeedbackRounds(rounds) {
  if (!rounds.length) return '<div class="loading">No feedback files found</div>';

  const roundTabs = rounds.length > 1
    ? `<div class="round-tabs">${rounds.map((r,i)=>`<button class="round-tab ${i===0?'active':''}" onclick="switchRound(${r.round},this)">Round ${r.round}</button>`).join('')}</div>`
    : '';

  const panels = rounds.map((r,i) => {
    const key = `fb-${r.round}`;
    _store[key] = r.raw;
    const items = r.data?.items || [];
    if (!items.length) {
      return `<div id="fb-round-${r.round}" class="fb-round ${i===0?'active':''}">
        <div class="card"><div class="card__hdr">
          <span class="card__title">Feedback Round ${r.round}</span>
          <button class="copy-btn" onclick="copyKey('${key}',this)">Copy</button>
        </div><div class="card__body"><div class="prose">${md(r.raw)}</div></div></div>
      </div>`;
    }
    const itemsHtml = items.map(item=>`
      <div class="fb-item ${item.severity}">
        <div class="fb-item__header">
          <span class="fb-sev ${item.severity}">${item.severity.toUpperCase()}</span>
          <span class="fb-title">${escHtml(item.title)}</span>
        </div>
        <div class="prose">${md(item.body)}</div>
      </div>`).join('');
    return `<div id="fb-round-${r.round}" class="fb-round ${i===0?'active':''}">
      <div style="display:flex;justify-content:flex-end;margin-bottom:8px;">
        <button class="copy-btn" onclick="copyKey('${key}',this)">Copy</button>
      </div>
      ${itemsHtml}
    </div>`;
  }).join('');

  return roundTabs + panels;
}

// ── Build score table ──────────────────────────────────────────────
function buildScoreTable(raw) {
  const lines = raw.trim().split('\n');
  const rows = lines.filter(l=>l.startsWith('|') && !/^[-|: ]+$/.test(l));
  if (!rows.length) return `<div class="prose">${md(raw)}</div>`;

  const isHeader = (cells) => cells.some(c=>/criterion|criteria/i.test(c));
  let html = '<table class="score-table">';

  rows.forEach((row, i) => {
    const cells = row.split('|').filter((_,j,a)=>j>0&&j<a.length-1).map(c=>c.trim());
    if (isHeader(cells)) {
      html += '<thead><tr>'+cells.map(c=>`<th>${escHtml(c)}</th>`).join('')+'</tr></thead><tbody>';
      return;
    }
    const scoreVal = parseFloat(cells[1]);
    const scoreClass = scoreVal >= 9 ? 'hi' : scoreVal >= 7 ? 'mid' : 'lo';
    const barClass = scoreClass;
    const barWidth = ((scoreVal||0)/10*100).toFixed(0);
    const tds = cells.map((c,j) => {
      if (j===1) return `<td><div class="bar-wrap"><div class="bar-track"><div class="bar-fill ${barClass}" style="width:${barWidth}%"></div></div><span class="score-num ${scoreClass}">${escHtml(c)}</span></div></td>`;
      return `<td>${escHtml(c)}</td>`;
    }).join('');
    html += `<tr>${tds}</tr>`;
  });
  html += '</tbody></table>';
  return html;
}

// ── Escape HTML ────────────────────────────────────────────────────
function escHtml(s) {
  return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

// ── Discover runs ──────────────────────────────────────────────────
async function discoverRuns() {
  const r = await fetch('/runs/');
  if (!r.ok) return [];
  const html = await r.text();
  const matches = [...html.matchAll(/href="(\d{8}-\d{6}-[^/"]+)\//g)];
  return matches.map(m=>m[1]).sort().reverse();
}

// ── Select run ─────────────────────────────────────────────────────
let currentRun = null;
async function selectRun(runId) {
  if (currentRun === runId) return;
  currentRun = runId;
  document.querySelectorAll('.run-item').forEach(el=>el.classList.toggle('active', el.dataset.run===runId));
  document.getElementById('main').innerHTML = '<div class="loading">Loading...</div>';
  try {
    const data = await loadRun(runId);
    document.getElementById('main').innerHTML = renderRun(data);
  } catch(e) {
    document.getElementById('main').innerHTML = `<div class="run-view"><div class="error-banner">Failed to load run: ${escHtml(e.message)}</div></div>`;
  }
}

// ── Init ───────────────────────────────────────────────────────────
let allRuns = [];
let visibleCount = 20;

function renderRunList(runs, summaries) {
  const list = document.getElementById('run-list');
  const items = runs.slice(0, visibleCount).map(id => {
    const s = summaries.find(x=>x.id===id)?.summary;
    const score = s?.score || 0;
    const verdict = s?.verdict?.toUpperCase()==='PASS' ? 'pass' : s ? 'fail' : 'unknown';
    const dateStr = id.slice(0,13).replace(/(\d{4})(\d{2})(\d{2})-(\d{2})(\d{2})/,'$1-$2-$3 $4:$5');
    const taskName = s?.task || id.replace(/^\d{8}-\d{6}-/,'');
    return `<div class="run-item" data-run="${id}" onclick="selectRun('${id}')">
      <div class="run-item__dot ${verdict}"></div>
      <div class="run-item__name" title="${escHtml(id)}">${escHtml(taskName)}</div>
      <div class="run-item__score-badge ${verdict}">${score>0?score.toFixed(1):'-'} ${verdict==='pass'?'P':verdict==='fail'?'F':''}</div>
      <div style="grid-column:2;grid-row:2;" class="run-item__date">${dateStr}</div>
    </div>`;
  }).join('');

  const hasMore = runs.length > visibleCount;
  list.innerHTML = items + (hasMore
    ? `<button class="load-more" onclick="loadMore()">Load ${runs.length - visibleCount} more</button>`
    : '');

  document.getElementById('run-count').textContent = `${runs.length} runs`;
  document.getElementById('empty-sub').textContent = `${runs.length} runs available`;
}

function loadMore() {
  visibleCount += 20;
  renderRunList(allRuns, window._summaries || []);
}

async function init() {
  allRuns = await discoverRuns();

  if (!allRuns.length) {
    document.getElementById('run-list').innerHTML = '<div class="loading">No runs found</div>';
    document.getElementById('run-count').textContent = '0 runs';
    document.getElementById('empty-sub').textContent = 'No runs in /runs/ directory';
    return;
  }

  // Load summaries for first batch
  const summaries = await Promise.all(
    allRuns.slice(0, Math.max(visibleCount, 20)).map(async id => {
      const text = await getText(`/runs/${id}/run-summary.md`);
      return { id, summary: parseSummary(text) };
    })
  );
  window._summaries = summaries;

  renderRunList(allRuns, summaries);

  // Auto-select latest
  if (allRuns[0]) selectRun(allRuns[0]);
}

init();
</script>
